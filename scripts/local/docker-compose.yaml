version: "3.8"
services:
  terrakube-dex:
    image: ghcr.io/dexidp/dex:v2.32.0
    container_name: dex-service-local
    volumes:
    - ./config-ldap.yaml:/etc/dex/config.docker.yaml
    ports:
      - 5556:5556
  ldap-service:
    image: osixia/openldap:1.5.0
    environment:
      LDAP_ORGANISATION: "Example, Inc"
      LDAP_DOMAIN: "example.org"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_TLS: "false"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
    volumes:
    - ./ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom
    ports:
    - 389:389
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - 'minio_data:/data'
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: ["/bin/sh","-c","until /usr/bin/mc alias set tk http://minio:9000 minioadmin minioadmin; do echo 'waiting for minio'; sleep 2; done; /usr/bin/mc mb --ignore-existing tk/sample; exit 0;"]
  redis-service:
    image: valkey/valkey:8-alpine
    command:
      - valkey-server
      - --requirepass
      - password123456
      - --rename-command
      - FLUSHDB
      - ""
      - --rename-command
      - FLUSHALL
      - ""
    ports:
      - '6379:6379'
    volumes:
      - 'redis_data:/data'

volumes:
  minio_data:
  redis_data:


