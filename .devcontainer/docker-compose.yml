  AwsTerraformOutputBucketName: $TK_OUTPUT_BUCKET_NAME
  AwsTerraformOutputRegion: ${TK_OUTPUT_BUCKET_REGION}
  AzBuilderApiUrl: https://terrakube-api.${DOMAIN}
