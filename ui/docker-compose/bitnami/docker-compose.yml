version: "3.8"
services:
  terrakube-ui:
    image: nginx:alpine
    volumes:
      - /workspace/terrakube/ui/build:/app
      - /workspace/terrakube/ui/conf/conf.d/bitnami.conf:/etc/nginx/conf.d/default.conf
      - /workspace/terrakube/ui/env-config.js /app/env-config.js
    ports:
      - 3000:80
