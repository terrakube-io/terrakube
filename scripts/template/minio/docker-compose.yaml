version: '2'

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_SERVER_URL: 'GITPOD_MINIO_URL'
      MINIO_BROWSER_REDIRECT_URL: 'GITPOD_MINIO_CONSOLE_URL'
    volumes:
      - 'minio_data:/data'
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: ["/bin/sh","-c","until /usr/bin/mc alias set tk http://minio:9000 minioadmin minioadmin; do echo 'waiting for minio'; sleep 2; done; /usr/bin/mc mb --ignore-existing tk/sample; exit 0;"]

volumes:
  minio_data:
    driver: local