version: "3.8"
services:
  dex-service:
    image: ghcr.io/dexidp/dex:${TK_DEX_VERSION}
    container_name: dex-service
    environment:
      TK_DEX_ISSUER: ${TK_DEX_ISSUER:-http://127.0.0.1:5556/dex}
      TK_DEX_STATIC_CLIENT: ${TK_DEX_STATIC_CLIENT:-}
    volumes:
    - ./config-ldap.yaml:/etc/dex/config.docker.yaml
    ports:
      - 5556:5556
    networks:
      - tools
  ldap-service:
    image: bitnamilegacy/openldap:2.6.9-debian-12-r10
    container_name: ldap-service
    environment:
      LDAP_TLS_VERIFY_CLIENT: try
      LDAP_ADMIN_USERNAME: "admin"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_ROOT: "dc=example,dc=org"
      LDAP_CUSTOM_LDIF_DIR: "/ldifs"
    volumes:
      - ./config-ldap.ldif:/ldifs/config-ldap.ldif
    networks:
      - tools
