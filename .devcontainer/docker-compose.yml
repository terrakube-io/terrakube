  REACT_APP_CLIENT_ID: terrakube-app
  REACT_APP_AUTHORITY: https://terrakube-dex.${DOMAIN}/dex
  REACT_APP_REDIRECT_URI: https://terrakube.${DOMAIN}
  REACT_APP_REGISTRY_URI: https://terrakube-registry.${DOMAIN}
